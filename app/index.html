<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amaury Mulcey</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body class="bg-gray-300">
    <div id="app" class="h-[297mm] w-[210mm] bg-neutral-50 text-gray-900 px-6 py-5 mx-auto font-sans text-sm"></div>

    <script type="module">
      const modules = import.meta.glob('./contents/*.ts')
      const params = new URLSearchParams(window.location.search)
      const content = params.get('content') || 'french_qualyse_resume'
      const key = `./contents/${content}.ts`
      if (modules[key]) {
        await modules[key]()
      } else {
        console.error(`Content not found: ${key}`)
      }
    </script>
  </body>
</html>
